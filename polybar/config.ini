[bar/main]
width = 100%
height = 28
bottom = false
background = #1e1e2e
foreground = #cdd6f4
font-0 = JetBrainsMono Nerd Font:size=10:antialias=true
modules-left = i3
modules-center = date
modules-right = pulseaudio battery cpu memory

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused-foreground = #cba6f7
label-unfocused-foreground = #6c7086

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
label-charging = ⚡ %percentage%%
label-discharging = 🔋 %percentage%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠 "
format-prefix-foreground = #89b4fa
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = #a6e3a1
label = %mb_used%
